# 规划器配置：定义目标区域、中心占点参数以及全局/局部规划的基础采样设置。
planner:  # 规划主配置，用于全局 A*、Omni-DWA 和 Center Hold 行为。
  loop_hz: 20  # 规划线程运行频率，单位 Hz。
  supply_start_x_m: 0  # 补给区起点的全局 X 坐标，单位米。
  supply_start_y_m: 0  # 补给区起点的全局 Y 坐标，单位米。
  center_goal_x_m: 6.0  # 中心区目标点的全局 X 坐标，单位米。
  center_goal_y_m: 3.0  # 中心区目标点的全局 Y 坐标，单位米。
  center_radius_m: 0.35  # 判定进入中心区的半径阈值，单位米。
  yaw_align_tolerance_rad: 0.12  # 到点后朝向对齐允许误差，单位弧度。
  center_hold_settle_frames: 5  # 进入目标半径后需连续满足的最少规划帧数，避免刚到点就因抖动反复切换。
  center_hold_settle_time_ms: 500  # 进入目标半径后需连续驻留的最小时长，单位毫秒。
  recenter_threshold_m: 0.9  # 偏离中心点超过该距离后重新触发回中逻辑，单位米。
  max_vx_mps: 1.5  # 底盘前向最大速度，单位米每秒。
  max_vy_mps: 1.5  # 底盘侧向最大速度，单位米每秒。
  max_wz_radps: 1.0  # 底盘最大角速度，单位弧度每秒。
  hold_max_v_mps: 0.25  # 中心保持阶段的线速度限幅，单位米每秒。
  hold_max_wz_radps: 0.35  # 中心保持阶段的角速度限幅，单位弧度每秒。
  center_hold_slot_radius_m: 0.45  # 中心点周围候选待机位半径，单位米；中心位被占时会优先选这些守点位。
  center_hold_occupied_radius_m: 0.40  # 判断中心位/待机位被动态目标占用的距离阈值，单位米。
  center_hold_dynamic_bias_radius_m: 1.10  # 动态目标进入该半径后会对守点目标产生偏置，单位米。
  center_hold_max_bias_m: 0.28  # 守点目标受动态目标影响时允许的最大偏置距离，单位米。
  center_hold_position_deadband_m: 0.06  # 守点微调位置死区，单位米，小于该误差时不做线速度修正。
  center_hold_yaw_deadband_rad: 0.05  # 守点微调朝向死区，单位弧度，小于该误差时不做角速度修正。
  center_hold_micro_max_v_mps: 0.12  # 守点微调允许的最大线速度，单位米每秒，避免占点后大幅抽动。
  center_hold_micro_max_wz_radps: 0.18  # 守点微调允许的最大角速度，单位弧度每秒。
  center_hold_position_kp: 0.8  # 守点微调的位置比例增益，越大回点越快，但也更容易抖。
  center_hold_yaw_kp: 0.9  # 守点微调的朝向比例增益。
  dwa_linear_samples: 9 # DWA 前向速度采样数量。
  dwa_lateral_samples: 9  # DWA 侧向速度采样数量。
  dwa_yaw_samples: 11  # DWA 角速度采样数量。
  dwa_horizon_s: 1.0  # DWA 轨迹前向预测时域，单位秒。
  dwa_dt_s: 0.2  # DWA 轨迹离散积分步长，单位秒。
  weight_heading: 2.0  # DWA 趋向目标的权重，越大越优先朝目标方向收敛。
  weight_clearance: 5.0  # DWA 避障安全距离权重，越大越倾向远离障碍物。
  weight_velocity: 0.2  # DWA 速度收益权重，越大越鼓励选择更高速度。
  weight_dynamic: 8.0  # DWA 动态障碍避让权重，越大越保守地规避运动目标。
  dynamic_inflation_m: 0.2  # 动态障碍额外膨胀半径，单位米，用于给运动目标留出安全余量。
  dynamic_influence_distance_m: 1.6  # 动态障碍开始显著影响 DWA 打分的最小净空距离，单位米。
  dynamic_emergency_distance_m: 0.2  # 动态障碍进入紧急避让区的净空阈值，单位米，越小越激进。
  dynamic_high_risk_penalty_scale: 1.0  # 高风险动态目标的额外惩罚系数，越大越倾向提前绕开已确认且高速的目标。
  dynamic_crossing_penalty_scale: 1.4  # 横穿/抢道场景的额外惩罚系数，越大越不愿意和运动目标抢穿越时机。
  recovery_light_escalate_cycles: 18  # L1 轻恢复连续执行多少个 tick 后升级到 L2，适合短时拥堵/遮挡场景。
  recovery_medium_escalate_cycles: 24  # L2 中恢复连续执行多少个 tick 后升级到 L3，避免长时间原地折腾。
  recovery_heavy_exhaust_cycles: 30  # L3 重恢复持续多少个 tick 后判定恢复耗尽并交给 FAILSAFE。
  recovery_heavy_restart_ticks: 8  # 重恢复成功后缓启动持续的 tick 数，避免刚恢复就猛冲。
  recovery_light_rotate_wz_radps: 0.28  # L1 原地小角度旋转的角速度，单位弧度每秒。
  recovery_light_shift_vy_mps: 0.10  # L1 微小横移的侧向速度，单位米每秒。
  recovery_light_forward_vx_mps: 0.08  # L1 重采样局部目标时允许的轻微前进速度，单位米每秒。
  recovery_medium_backoff_vx_mps: 0.14  # L2 倒退脱困的速度，单位米每秒。
  recovery_medium_shift_vy_mps: 0.18  # L2 横移脱困的侧向速度，单位米每秒。
  recovery_medium_rotate_wz_radps: 0.20  # L2 倒退/横移阶段配合的角速度，单位弧度每秒。
  recovery_reapproach_forward_vx_mps: 0.08  # L2 重新选取接近点后，朝临时 waypoint 缓慢靠近的前进速度，单位米每秒。
  recovery_reapproach_lateral_offset_m: 0.45  # L2 临时 approach waypoint 的侧向偏移距离，单位米。
  recovery_reapproach_lookahead_points: 4  # L2 在全局路径上向前选取多少个点作为临时接近点。
  recovery_clearance_weight_scale: 1.5  # 恢复期额外清障权重倍率，主要用于日志和调试，数值越大表示越保守。
  recovery_slow_restart_linear_scale: 0.25  # 重恢复成功后缓启动阶段的线速度缩放比例。
  recovery_slow_restart_yaw_scale: 0.35  # 重恢复成功后缓启动阶段的角速度缩放比例。
