# Mock Planner 场景配置：定义假数据发生器的起点、目标点、静态墙和动态障碍轨迹。
# 修改这个文件即可在不改代码的情况下切换障碍物运动模式、目标点切换和简单静态地图布局。
mock:
  start_x_m: 1.2  # 自车初始全局 X 坐标，单位米。
  start_y_m: 2.0  # 自车初始全局 Y 坐标，单位米。
  start_yaw_rad: 0.0  # 自车初始偏航角，单位弧度。
  primary_goal_x_m: 6.0  # 主目标点全局 X 坐标，默认用于中心区占点。
  primary_goal_y_m: 3.0  # 主目标点全局 Y 坐标。
  primary_goal_yaw_rad: 0.0  # 主目标点期望朝向，单位弧度。
  secondary_goal_x_m: 1.2  # 次目标点全局 X 坐标，可用于起点和中心点往返切换。
  secondary_goal_y_m: 2.0  # 次目标点全局 Y 坐标。
  secondary_goal_yaw_rad: 0.0  # 次目标点期望朝向，单位弧度。
  switch_goal_period_s: 0.0  # 目标切换周期，单位秒；0 表示只使用主目标点。
  integrate_pose: true  # 是否按上一帧底盘命令做简单位姿积分；false 表示自车位姿固定。
  map_width_cells: 100  # 静态地图宽度，单位栅格。
  map_height_cells: 70  # 静态地图高度，单位栅格。
  map_resolution_m: 0.1  # 静态地图分辨率，单位米/格。

walls:
  - x0: 0  # 第一段墙起点栅格 X。
    y0: 0  # 第一段墙起点栅格 Y。
    x1: 99  # 第一段墙终点栅格 X。
    y1: 0  # 第一段墙终点栅格 Y。
  - x0: 0  # 第二段墙起点栅格 X。
    y0: 69  # 第二段墙起点栅格 Y。
    x1: 99  # 第二段墙终点栅格 X。
    y1: 69  # 第二段墙终点栅格 Y。
  - x0: 0  # 左侧边界墙起点栅格 X。
    y0: 0  # 左侧边界墙起点栅格 Y。
    x1: 0  # 左侧边界墙终点栅格 X。
    y1: 69  # 左侧边界墙终点栅格 Y。
  - x0: 99  # 右侧边界墙起点栅格 X。
    y0: 0  # 右侧边界墙起点栅格 Y。
    x1: 99  # 右侧边界墙终点栅格 X。
    y1: 69  # 右侧边界墙终点栅格 Y。
  - x0: 34  # 中间窄门上方竖墙起点栅格 X。
    y0: 8  # 中间窄门上方竖墙起点栅格 Y。
    x1: 34  # 中间窄门上方竖墙终点栅格 X。
    y1: 24  # 中间窄门上方竖墙终点栅格 Y。
  - x0: 34  # 中间窄门下方竖墙起点栅格 X。
    y0: 36  # 中间窄门下方竖墙起点栅格 Y。
    x1: 34  # 中间窄门下方竖墙终点栅格 X。
    y1: 58  # 中间窄门下方竖墙终点栅格 Y。
  - x0: 58  # 右上横墙起点栅格 X。
    y0: 18  # 右上横墙起点栅格 Y。
    x1: 78  # 右上横墙终点栅格 X。
    y1: 18  # 右上横墙终点栅格 Y。
  - x0: 58  # 右下横墙起点栅格 X。
    y0: 48  # 右下横墙起点栅格 Y。
    x1: 78  # 右下横墙终点栅格 X。
    y1: 48  # 右下横墙终点栅格 Y。

obstacles:
  - id: 1  # 障碍物唯一编号。
    motion: linear  # 运动模型：linear 为世界坐标匀速直线，chase 为相对自车追逐。
    x_m: 3.8  # 初始全局 X 坐标，单位米。
    y_m: 1.0  # 初始全局 Y 坐标，单位米。
    vx_mps: 0.0  # 世界坐标 X 方向速度，单位米每秒。
    vy_mps: 0.7  # 世界坐标 Y 方向速度，单位米每秒。
    radius_m: 0.32  # 障碍物碰撞半径，单位米。
    offset_x_m: 0.0  # chase 模式下相对自车的 X 偏移；linear 模式下忽略。
    offset_y_m: 0.0  # chase 模式下相对自车的 Y 偏移；linear 模式下忽略。
  - id: 2  # 第二个障碍物唯一编号。
    motion: linear  # 迎面障碍通常用 linear，再把速度朝向自车方向设置为负。
    x_m: 5.8  # 初始全局 X 坐标。
    y_m: 3.0  # 初始全局 Y 坐标。
    vx_mps: -0.75  # 沿 X 方向朝自车移动。
    vy_mps: 0.0  # Y 方向速度。
    radius_m: 0.35  # 碰撞半径。
    offset_x_m: 0.0  # chase 模式偏移，占位保留。
    offset_y_m: 0.0  # chase 模式偏移，占位保留。
  - id: 3  # 第三个障碍物唯一编号。
    motion: chase  # chase 模式会围绕自车做相对追逐。
    x_m: 0.0  # chase 模式下该初始 X 不参与计算，可保留为 0。
    y_m: 0.0  # chase 模式下该初始 Y 不参与计算，可保留为 0。
    vx_mps: 0.9  # 相对追逐时叠加的 X 方向漂移速度。
    vy_mps: 0.03  # 相对追逐时叠加的 Y 方向漂移速度。
    radius_m: 0.30  # 碰撞半径。
    offset_x_m: -1.2  # 相对自车的初始 X 偏移。
    offset_y_m: -0.25  # 相对自车的初始 Y 偏移。
  - id: 4  # 第四个障碍物唯一编号。
    motion: linear  # 横向贴边直线移动障碍。
    x_m: 2.2  # 初始全局 X 坐标。
    y_m: 2.55  # 初始全局 Y 坐标。
    vx_mps: 0.5  # X 方向匀速移动。
    vy_mps: 0.0  # Y 方向速度。
    radius_m: 0.28  # 碰撞半径。
    offset_x_m: 0.0  # chase 模式偏移，占位保留。
    offset_y_m: 0.0  # chase 模式偏移，占位保留。
