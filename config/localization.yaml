# 定位配置：定义静态地图输入、匹配器选择以及定位质量判定阈值。
localization:  # 定位主配置，用于地图加载、scan matcher 和 map->odom 修正。
  enabled: true  # 是否启用定位模块。
  occupancy_path: ../maps/combat/active/occupancy.bin  # 占据栅格地图文件路径。
  global_map_pcd_path: ../maps/combat/active/global_map.pcd  # 全局点云地图文件路径。
  map_meta_path: ../maps/combat/active/map_meta.json  # 地图元信息文件路径，包含分辨率和原点等描述。
  matcher: icp  # 当前启用的 scan matcher 类型，例如 icp 或 ndt。
  max_iterations: 8  # 匹配器每帧最大迭代次数。
  correspondence_distance_m: 0.8  # 建立点对应关系的最大距离阈值，单位米。
  min_match_score: 0.5  # 认为匹配可信的最小得分阈值。
  max_position_jump_m: 1.2  # 单帧允许的最大位置跳变，超过则视为异常，单位米。
  max_yaw_jump_rad: 0.8  # 单帧允许的最大偏航跳变，超过则视为异常，单位弧度。
  map_downsample_step: 1  # 地图点云下采样步长，1 表示不跳点。
  slow_match_threshold_ms: 12  # 单帧匹配耗时超过该阈值时切换更轻参数，单位毫秒。
  reduced_max_iterations: 4  # 降级匹配模式下的最大迭代次数。
  reduced_scan_stride: 2  # 降级匹配模式下的扫描跳点步长，2 表示每隔 1 个点取 1 个。
