# 系统级运行配置：定义程序名、版本、日志级别、自动退出时长以及各工作线程的 CPU 绑定策略。
app_name: rm_nav_main  # 程序可执行名，用于日志、诊断和启动识别。
version: 0.1.0  # 当前系统版本号，用于和构建产物及配置集对应。
log_level: INFO  # 日志输出级别，可选例如 DEBUG/INFO/WARN/ERROR。
log_file_path: logs/rm_nav.log  # 主日志文件基准路径；实际会按日期滚动成 logs/rm_nav-YYYY-MM-DD.log。
console_io_only: true  # 终端是否只保留雷达/串口等 IO 信息。true 时其他模块日志主要进文件，便于现场看关键硬件链路。
log_max_queue_size: 4096  # 异步日志队列最大缓存条数；队列打满后会优先丢弃 DEBUG/INFO，尽量保留 WARN/ERROR，避免异常风暴把内存拖高。
match_mode_enabled: false  # 比赛模式总开关。true 时：必须等待裁判系统开始信号；ammo 为 0 或 HP 低于阈值时会先回出生点补给/回血，再等待一段时间后返回中心点。
match_low_hp_threshold: 100  # 比赛模式下的低血量阈值；HP 低于该值时触发回出生点补给。
match_spawn_wait_ms: 5000  # 比赛模式下到达出生点后的等待时间，单位毫秒；等待结束后重新返回中心点。
bringup_mode: none  # 启动预设模式；正式运行默认用 none。runtime 主链模式切换现在统一由 bringup_mode + manual_mode_selector/FSM 决定，不再需要靠 mapping/localization 的 enabled 字段切换建图/定位。
auto_shutdown_ms: 300000  # 自动退出时间，单位毫秒；调试空转链路时可用于定时收尾。
manual_mode_selector: -1 # 手动模式选择枚举；-1 表示自动 FSM：若 active 地图存在则走 combat，不存在则走 warmup；0 表示只走 MODE_WARMUP+MODE_SAVE；1 表示只走 MODE_COMBAT/GOTO_CENTER/HOLD_CENTER/RECENTER/RECOVERY。
threads:  # 线程绑定配置，-1 表示不固定到特定 CPU 核心。
  driver_cpu: -1  # 驱动线程绑定核心，负责雷达、IMU、STM32 等底层 IO。
  sync_cpu: -1  # 同步线程绑定核心，负责传感器时间对齐与同步帧生成。
  pose_core_cpu: -1  # 位姿核心线程绑定核心，负责定位与 TF 主链更新。
  perception_cpu: -1  # 感知线程绑定核心，负责预处理、局部代价图和动态障碍。
  planner_cpu: -1  # 规划线程绑定核心，负责全局路径和局部控制输出。
  safety_fsm_cpu: -1  # 安全/FSM 线程绑定核心，负责指令约束和安全态切换。
  debug_cpu: -1  # 调试线程绑定核心，负责统计输出和调试旁路发布。
